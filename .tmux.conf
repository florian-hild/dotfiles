# tmux.conf

# ── Prefix ──────────────────────────────────────────────────
unbind C-b
set  -g prefix C-a
bind   C-a send-prefix

# ── General ─────────────────────────────────────────────────
set  -g  default-terminal "tmux-256color"
set  -ga terminal-overrides ",*256col*:Tc"
set  -g  history-limit 50000
set  -g  base-index 1
setw -g  pane-base-index 1
set  -g  renumber-windows on
set  -g  escape-time 10
set  -g  focus-events on
setw -g  mode-keys vi
set  -g  mouse on

# ── Palette (Nord-ish) ──────────────────────────────────────
#   bg0  #2e3440  base background       (polar night)
#   bg1  #3b4252  panel / inactive bg
#   bg2  #434c5e  separators
#   fg   #d8dee9  primary text
#   mute #4c566a  muted text / borders
#   blue #88c0d0  accent (active win)
#   cyan #8fbcbb  info
#   grn  #a3be8c  ok / sync-on
#   yel  #ebcb8b  warn / prefix
#   red  #bf616a  alert / root / prod
#   mag  #b48ead  zoom

# ── Status bar ──────────────────────────────────────────────
set -g status              on
set -g status-interval     5
set -g status-position     bottom
set -g status-justify      left
set -g status-style        "bg=#2e3440,fg=#d8dee9"

# Left: state indicators (prefix • sync • zoom)
set -g status-left-length  60
set -g status-left "\
#[fg=#2e3440,bg=#88c0d0,bold] λ #[fg=#88c0d0,bg=#3b4252,nobold]\
#[fg=#d8dee9,bg=#3b4252] #S \
#[fg=#3b4252,bg=#2e3440]\
#{?client_prefix,#[fg=#ebcb8b#,bg=#2e3440#,bold] PFX ,}\
#{?pane_synchronized,#[fg=#a3be8c#,bg=#2e3440#,bold] SYNC ,}\
#{?window_zoomed_flag,#[fg=#b48ead#,bg=#2e3440#,bold] ZOOM ,}\
"

# Window list
setw -g window-status-separator ""
setw -g window-status-format         "#[fg=#4c566a,bg=#2e3440]  #I·#W  "
setw -g window-status-current-format "\
#[fg=#2e3440,bg=#88c0d0]\
#[fg=#2e3440,bg=#88c0d0,bold] #I·#W \
#[fg=#88c0d0,bg=#2e3440]"
setw -g window-status-activity-style "fg=#ebcb8b,bg=#2e3440"
setw -g window-status-bell-style     "fg=#bf616a,bg=#2e3440,bold"

# Right: mouse • clock • host (host script handles env-color + ssh)
set -g status-right-length 120
set -g status-right "\
#[fg=#3b4252,bg=#2e3440]#[fg=#{?mouse,#a3be8c,#bf616a},bg=#3b4252] #{?mouse,●,○} \
#[fg=#434c5e,bg=#3b4252]#[fg=#d8dee9,bg=#434c5e] %d-%m-%Y %H:%M \
#[fg=#88c0d0,bg=#434c5e]#[fg=#2e3440,bg=#88c0d0,bold] #(~/.tmux/scripts/userhost.sh #{pane_pid}) \
"

# ── Panes & messages ────────────────────────────────────────
set -g pane-border-style        "fg=#3b4252"
set -g pane-active-border-style "fg=#88c0d0"
set -g pane-border-status off
set -g display-panes-colour        "#4c566a"
set -g display-panes-active-colour "#88c0d0"
set -g message-style         "fg=#2e3440,bg=#ebcb8b,bold"
set -g message-command-style "fg=#2e3440,bg=#88c0d0,bold"
set -g mode-style            "fg=#2e3440,bg=#88c0d0,bold"

# Visual notices instead of bell
set -g monitor-activity on
set -g visual-activity  off
set -g visual-bell      off
set -g bell-action      none

# ── Key bindings ────────────────────────────────────────────
# Splits keep current path
unbind '"'
unbind %
bind  h split-window -h -c "#{pane_current_path}"
bind  v split-window -v -c "#{pane_current_path}"

# Pane / window management
bind  x kill-pane
bind  X kill-window
bind  + resize-pane -Z                                      # zoom toggle
bind  s set-window-option synchronize-panes \; display-message -d 800 "Sync: #{?pane_synchronized,ON,OFF}"
bind  m set -g mouse                                        # toggle mouse
bind  n command-prompt -I "#W" "rename-window '%%'"
bind  N command-prompt -I "#S" "rename-session '%%'"
bind  r source-file ~/.tmux.conf \; display-message -d 800 "Config reloaded"

# No-prefix navigation
bind -n M-n     new-window -c "#{pane_current_path}"
bind -n M-Down  new-window -c "#{pane_current_path}"
bind -n M-Left  previous-window
bind -n M-Right next-window
bind -n S-Left  select-pane -L
bind -n S-Right select-pane -R
bind -n S-Up    select-pane -U
bind -n S-Down  select-pane -D

# Repeatable pane resizing
bind -r H resize-pane -L 5
bind -r J resize-pane -D 3
bind -r K resize-pane -U 3
bind -r L resize-pane -R 5

# Copy-mode + clipboard (cross-platform via clip.sh)
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "~/.tmux/scripts/clip.sh"
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "~/.tmux/scripts/clip.sh"
bind -n MouseDown3Pane run-shell "tmux paste-buffer"
